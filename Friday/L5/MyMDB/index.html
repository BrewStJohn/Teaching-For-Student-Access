<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <!-- jQuery library -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
    <!-- Popper JS -->
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <!-- 1) create a nav -->



    <div id="head">
        <h1>Welcome to MyMDb</h1>
        <h4 id='status'></h4>
    </div>

    <div id="movie-tabs" class="container-fluid">

        <ul class="nav nav-tabs" id="myTabs">
            <li class="nav-item">
                <a class="nav-link active" id="brief-tab" data-toggle="tab" href="#brief-view">Brief View</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="detail-tab" data-toggle="tab" href="#detail-view">Detailed View</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="reception-tab" data-toggle="tab" href="#reception">Critical Reception</a>
            </li>
        </ul>

        <div class="tab-content" id="myContent">
            <div class="tab-pane fade show active" id="brief-view" >
                <table>
                    <tr>
                        <th>Poster</th>
                        <th>Title</th>
                        <th>Year</th>
                    </tr>
                </table>
            </div>

            <div class="tab-pane fade" id="detail-view">
                <!-- TODO: Posters, Links and Collapse -->
            </div>

            <div class="tab-pane fade" id="reception">
                <!-- TODO: Table -->
            </div>

        </div>
    </div>
</body>
</html>
