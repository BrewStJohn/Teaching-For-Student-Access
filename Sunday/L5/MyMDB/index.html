<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">


    <!-- Add in the import for Bootstrap -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>    
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>

<body>
    <!-- 1) Add a nav from Bootstrap -->
        <div id="head">
            <h1>Welcome to MyMDb</h1>
            <h4 id='status'></h4>
        </div>

        <div id="movie-tabs" class="container-fluid">
            <ul class="nav nav-tabs" id="myTabs">
                <li class="nav-item">
                    <a class="nav-link active" id="brief-tab" data-toggle="tab" href="#brief-view">Brief View</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" id="detail-tab" data-toggle="tab" href="#detail-view">Detailed View</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" id="reception-tab" data-toggle="tab" href="#reception">Critical Reception</a>
                </li>
            </ul>
            <div class="tab-content" id="myContent">
                <div class="tab-pane fade show active" id="brief-view" >
                    <table class="table table-striped">
                        <thead>
                            <th scope="col">Poster</th>
                            <th scope="col">Title</th>
                            <th scope="col">Year</th>
                        </thead>
                        <tbody>
                            <!-- 4) we need to fill this in
                             with jQuery add elements -->
                        </tbody>
                    </table>
                </div>

                <div class="tab-pane fade" id="detail-view">
                </div>
                <div class="tab-pane fade" id="reception">
                    
                </div>
            </div>
        </div>

    craft your own query about your favourite
