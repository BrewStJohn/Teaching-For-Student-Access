<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Link the stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 
    
    Time to create some content:
    1) divs (visual grey blocks)
    2) Paragraphs / Headers
    3) Textareas / inputs
    // -> look at chat for textareas
    4) Buttons

    -->
    <div>
        <h1> Caesar Cipher </h1>
    </div>

    <div>
        <p>Type your message into the box and then press submit to see your encrypted or decrypted text.</p>
        <textarea id="rawInput" cols="30" rows="10" maxlength="250" placeholder="Enter raw input"></textarea>
        <br>
        <button type="button">Submit your text</button>
    </div>

    <div>
        <h3> Simple Cipher</h3>
        <textarea id="simpleOutput" cols="30" rows="10" maxlength="250" placeholder="Simple cipher output"></textarea>
        <textarea id="simpleDecoded" cols="30" rows="10" maxlength="250" placeholder="Decoded text"></textarea>
    </div>

    <div>
        <h3> Strong Cipher</h3>
        <textarea id="strongOutput" cols="30" rows="10" maxlength="250" placeholder="Strong cipher output"></textarea>
        <textarea id="strongDecoded" cols="30" rows="10" maxlength="250" placeholder="Decoded text from strong encipher"></textarea>
    </div>

</body>
</html>
