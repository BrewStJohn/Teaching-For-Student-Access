<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Caesar Cipher</title>
        <link rel='stylesheet' href="style.css">
        <script src="script.js"></script>
    </head>
    <body>
        <div>
            <h1>Caesar Cipher</h1>
        </div>

        <div>
            <p>Type your message into the box and then press submit to
                see your encrypted or decrypted text.</p>
            <textarea name="" id="rawInput" cols="30" rows="10" maxlength="500" placeholder="Enter raw input"></textarea>
            <br>
            <button id="submit">Submit your text!</button>
        </div>

        <div>
            <h3>Simple Cipher</h3>
            <textarea name="" id="encipher" cols="30" rows="10" maxlength="500" placeholder="Simple cipher output"></textarea>
            <textarea name="" id="decipher" cols="30" rows="10" maxlength="500" placeholder="Decoded text"></textarea>
        </div>

        <div>
            <h3>Strong Cipher</h3>
            <textarea name="" id="strongEncipher" cols="30" rows="10" maxlength="500" placeholder="Strong cipher output"></textarea>
            <textarea name="" id="strongDecipher" cols="30" rows="10" maxlength="500" placeholder="Decoded text from strong encipher"></textarea>
        </div>
    </body>
</html>
